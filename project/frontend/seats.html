<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="app-container">
        <div class="top-bar border-bottom">
            <a href="javascript:history.back()" class="back-btn fs-4 fw-bold pb-1">←</a>
            <h1 id="header-title" class="top-title w-100 text-center text-truncate pe-4 m-0" style="font-size: 0.95rem; color: #555;">Restaurant • Date • Time</h1>
        </div>
        
        <div class="p-3 bg-white border-bottom">
            <div class="d-flex justify-content-around rounded-4 mb-2 small fw-bold text-muted">
                <div class="d-flex align-items-center"><div class="chair available position-static me-2 mt-0"></div> Available</div>
                <div class="d-flex align-items-center"><div class="chair selected position-static me-2"></div> Selected</div>
                <div class="d-flex align-items-center"><div class="chair booked position-static me-2"></div> Booked</div>
            </div>
        </div>

        <div class="p-4 bg-light">
            <div class="text-center text-muted small mb-4 fw-bold">FRONT ENTRANCE</div>
            <div id="selection-summary" class="selection-summary-card mb-4">
                <div class="selection-summary-head">
                    <span id="summary-target">Guests: 0</span>
                    <span id="summary-picked">Selected: 0</span>
                </div>
                <div id="selection-hint" class="selection-hint-text">Select seats for your guests.</div>
                <div id="selected-seat-tags" class="selected-seat-tags"></div>
            </div>

            <div id="recommendation-panel" class="recommendation-panel mb-4"></div>

            <div id="seats-loading" class="text-center my-5 d-none">
                <div class="spinner-border" style="color:var(--primary-color)"></div>
            </div>

            <!-- Floor Plan rendered by JS -->
            <div id="floor-plan" class="floor-plan shadow-sm border">
                <!-- Tables & Chairs will go here -->
            </div>
            <div class="text-center text-muted small mt-4 fw-bold">BACK WALL</div>
        </div>

        <div class="bottom-bar d-flex justify-content-center">
            <button id="reserve-btn" class="btn-primary-custom shadow-lg" disabled onclick="showReserveModal()">Reserve Seat</button>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="index.html#search">Search</a>
        <a href="history.html">Bookings</a>
        <a href="profile.html">Profile</a>
    </nav>

    <!-- Booking Modal -->
    <div class="modal fade" id="reserveModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-0 pb-0 mt-2 mx-2">
                    <h5 class="modal-title fw-bold" style="color:var(--primary-color)">Finalize Reservation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-3">
                    <p class="text-muted small mb-4">You are about to reserve this seat. Please enter your contact details below.</p>
                    <div class="mb-3">
                        <label for="c-name" class="form-label text-secondary small fw-bold mb-1">Your Full Name</label>
                        <input type="text" class="form-control input-field bg-light border-0 py-2 rounded-3" id="c-name" placeholder="John Doe">
                    </div>
                    <div class="mb-4">
                        <label for="c-phone" class="form-label text-secondary small fw-bold mb-1">Phone Number</label>
                        <input type="tel" class="form-control input-field bg-light border-0 py-2 rounded-3" id="c-phone" placeholder="+91 ...">
                    </div>
                    <div class="mb-5">
                        <label for="c-req" class="form-label text-secondary small fw-bold mb-1">Special Preferences (Optional)</label>
                        <textarea class="form-control input-field bg-light border-0 py-2 rounded-3" id="c-req" rows="2" placeholder="Birthday decoration, window view..."></textarea>
                    </div>
                    <button type="button" class="btn-primary-custom shadow" onclick="confirmReservation()">Confirm Reservation</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>document.addEventListener('DOMContentLoaded', initSeats);</script>
</body>
</html>

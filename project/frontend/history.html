<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="app-container">
        <div class="top-bar border-bottom">
            <a href="index.html" class="back-btn fs-4 fw-bold pb-1">←</a>
            <h5 class="top-title w-100 text-center pe-4 m-0" style="color:var(--primary-color)">My Bookings</h5>
        </div>
        
        <div class="p-4">
            <form onsubmit="fetchHistory(event)" class="bg-white p-4 rounded-4 shadow-sm mb-4 border">
                <p class="small text-muted mb-4 fw-bold text-center">Enter your details to trace your past or upcoming reservations.</p>
                <div class="mb-3">
                    <input type="text" id="h-name" class="form-control input-field bg-light border-0 py-3 rounded-3" placeholder="Full Name">
                </div>
                <div class="mb-3 text-center text-muted small fw-bold">OR</div>
                <div class="mb-4">
                    <input type="tel" id="h-phone" class="form-control input-field bg-light border-0 py-3 rounded-3" placeholder="Phone Number">
                </div>
                <button type="submit" class="btn-primary-custom shadow position-relative mt-2">Find Bookings</button>
            </form>

            <div id="history-results">
                <!-- Data populated here -->
            </div>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="index.html#search">Search</a>
        <a href="history.html" class="active">Bookings</a>
        <a href="profile.html">Profile</a>
    </nav>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
